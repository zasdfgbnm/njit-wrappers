name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    name: ubuntu / py3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install torch and numba
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && pip install numba

      - name: Install dev dependencies
        run: pip install pytest pytest-cov pyright ruff

      - name: Build C++ extension
        run: python setup.py build_ext --inplace

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (pyright)
        run: PYTHONPATH=src pyright src/

      - name: Test (pytest)
        run: PYTHONPATH=src pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
