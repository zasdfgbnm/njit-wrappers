name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    name: ubuntu / py3.14
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install torch and numba
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && pip install numba

      - name: Install dev dependencies
        run: pip install pytest pytest-cov pyright ruff

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Build C++ extension
        run: python setup.py build_ext --inplace

      - name: Format check (clang-format)
        run: find src -name '*.cpp' -o -name '*.h' -o -name '*.cc' -o -name '*.cxx' | xargs clang-format --dry-run --Werror

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (pyright)
        run: PYTHONPATH=src pyright src/

      - name: Test (pytest)
        run: PYTHONPATH=src pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
