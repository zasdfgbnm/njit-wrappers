name: Docs

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: Build docs & run examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install torch and numba
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && pip install numba

      - name: Install doc and test dependencies
        run: pip install mkdocs-material pytest pytest-markdown-docs

      - name: Build C++ extension
        run: python setup.py build_ext --inplace

      - name: Build docs
        run: mkdocs build --strict

      - name: Run code examples in docs
        run: PYTHONPATH=src pytest --markdown-docs docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
