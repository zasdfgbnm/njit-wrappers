name: Docs

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: Build docs & run examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install torch and numba
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && pip install numba

      - name: Install doc and test dependencies
        run: pip install mkdocs-material pytest pytest-markdown-docs

      - name: Build C++ extension
        run: python setup.py build_ext --inplace

      - name: Install package
        run: pip install -e . --no-build-isolation

      - name: Build docs
        run: mkdocs build --strict

      - name: Run code examples in docs
        run: PYTHONPATH=src pytest --markdown-docs docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
